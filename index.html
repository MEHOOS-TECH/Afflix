    // ─── Supabase Config ──────────────────────────────────────────────────────
    const SUPABASE_URL = "https://yzrxehlzsvxdcdzjblqa.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_TK92rceDHou3aXxHMdqP_A_HE6buBHn";
    const BUCKET_POSTERS = "Posters";
    const BUCKET_SERIES  = "Series";

    const supabase = (() => {
      const headers = {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json",
      };

      const query = async (path, options = {}) => {
        const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
          headers: { ...headers, ...options.headers },
          ...options,
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || "Supabase error");
        }
        return res.status === 204 ? null : res.json();
      };

      const uploadFile = async (bucket, filePath, file) => {
        const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${bucket}/${filePath}`, {
          method: "POST",
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
            "Content-Type": file.type,
            "x-upsert": "true",
          },
          body: file,
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || `Upload to ${bucket} failed`);
        }
        return `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${filePath}`;
      };

      return { query, uploadFile };
    })();

    // ─── DB helpers ───────────────────────────────────────────────────────────
    const db = {
      getAnime: (search = "") => {
        const filter = search
          ? `?select=*&title=ilike.*${encodeURIComponent(search)}*&order=created_at.desc`
          : `?select=*&order=created_at.desc`;
        return supabase.query(`/anime${filter}`);
      },
      getAnimeById: (id) =>
        supabase.query(
          `/anime?id=eq.${id}&select=*,seasons(id,number,episodes(id,number,title,file_url,file_name,file_size))`
        ),
      createAnime: (data) =>
        supabase.query("/anime", {
          method: "POST",
          headers: { Prefer: "return=representation" },
          body: JSON.stringify(data),
        }),
      updateAnimeCover: (id, cover_url) =>
        supabase.query(`/anime?id=eq.${id}`, {
          method: "PATCH",
          headers: { Prefer: "return=representation" },
          body: JSON.stringify({ cover_url }),
        }),
      createSeason: (data) =>
        supabase.query("/seasons", {
          method: "POST",
          headers: { Prefer: "return=representation" },
          body: JSON.stringify(data),
        }),
      createEpisode: (data) =>
        supabase.query("/episodes", {
          method: "POST",
          headers: { Prefer: "return=representation" },
          body: JSON.stringify(data),

    const formatBytes = (bytes) => {
      if (!bytes) return "";
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
      if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + " MB";
      return (bytes / 1073741824).toFixed(2) + " GB";

    // ─── Toast ────────────────────────────────────────────────────────────────
    function Toast({ msg, onDone }) {
      useEffect(() => {
        const t = setTimeout(onDone, 2400);
        return () => clearTimeout(t);
      }, []);
      return <div className="toast">{msg}</div>;
    }

    // ─── Upload Modal ─────────────────────────────────────────────────────────
    function UploadModal({ onClose, onSuccess }) {
      const [form, setForm] = useState({ title: "", description: "", genre: "", season: "1", episode: "1", epTitle: "" });
      const [posterFile, setPosterFile] = useState(null);
      const [episodeFile, setEpisodeFile] = useState(null);
      const [loading, setLoading] = useState(false);
      const [progress, setProgress] = useState(0);
      const [step, setStep] = useState("");
      const [error, setError] = useState("");
      const [done, setDone] = useState(false);
      const [postDrag, setPostDrag] = useState(false);
      const [epDrag, setEpDrag] = useState(false);

      const set = (key) => (e) => setForm((f) => ({ ...f, [key]: e.target.value }));

      const submit = async () => {
        if (!form.title.trim()) return setError("Please enter the anime title.");
        if (!form.genre) return setError("Please select a genre.");
        if (!episodeFile) return setError("Please select an episode file.");
        setError(""); setLoading(true); setProgress(5);

        try {
          setStep("Creating anime record…");
          let anime;
          const existing = await db.getAnime(form.title);
          const match = existing?.find(
            (a) => a.title.toLowerCase() === form.title.trim().toLowerCase()
          );
          if (match) {
            anime = match;
          } else {
            const created = await db.createAnime({
              title: form.title.trim(),
              description: form.description.trim() || null,
              genre: form.genre,
            });
            anime = Array.isArray(created) ? created[0] : created;
          }
          setProgress(20);

          if (posterFile && !match?.cover_url) {
            setStep("Uploading poster…");
            const ext = posterFile.name.split(".").pop();
            const posterPath = `${anime.id}/poster-${Date.now()}.${ext}`;
            const posterUrl = await supabase.uploadFile(BUCKET_POSTERS, posterPath, posterFile);
            await db.updateAnimeCover(anime.id, posterUrl);
            anime.cover_url = posterUrl;
            setProgress(40);
          }

          setStep("Setting up season…");
          const seasons = await supabase.query(
            `/seasons?anime_id=eq.${anime.id}&number=eq.${form.season}&select=*`
          );
          let season;
          if (seasons?.length) {
            season = seasons[0];
          } else {
            const cs = await db.createSeason({ anime_id: anime.id, number: parseInt(form.season) });
            season = Array.isArray(cs) ? cs[0] : cs;
          }
          setProgress(55);

          setStep(`Uploading episode file to Series bucket…`);
          const safeFileName = sanitizeFileName(episodeFile.name);
          const epPath = `${anime.id}/s${form.season}/e${form.episode}-${Date.now()}-${safeFileName}`;
          const fileUrl = await supabase.uploadFile(BUCKET_SERIES, epPath, episodeFile);
          setProgress(88);

          setStep("Saving episode…");
          await db.createEpisode({
            season_id: season.id,
            number: parseInt(form.episode),
            title: form.epTitle.trim() || `Episode ${form.episode}`,
            file_url: fileUrl,
            file_name: episodeFile.name,
            file_size: episodeFile.size,
          });

          setProgress(100);
          setDone(true);
          setTimeout(() => { onSuccess(); onClose(); }, 1400);
        } catch (e) {
          setError(e.message || "Upload failed. Check your Supabase Storage policies.");
        } finally {
          setLoading(false);
        }
      };

      const steps = [
        "Creating anime record…",
        "Uploading poster…",
        "Setting up season…",
        "Uploading episode file to Series bucket…",
        "Saving episode…",
      ];

      return (
        <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && !loading && onClose()}>
          <div className="modal">
            <div className="modal-header">
              <h2>Upload Episode</h2>
              <button className="modal-close" onClick={() => !loading && onClose()}><Icon.Close /></button>
            </div>
            <div className="modal-body">
              {done
                ? <div className="success-banner">✓ Episode published successfully!</div>
                : <>
                    <div className="field">
                      <label>Anime Title *</label>
                      <input value={form.title} onChange={set("title")} placeholder="e.g. Attack on Titan" />
                    </div>
                    <div className="field">
                      <label>Description</label>
                      <textarea value={form.description} onChange={set("description")} placeholder="Short synopsis…" />
                    </div>
                    <div className="row">
                      <div className="field">
                        <label>Genre *</label>
                        <select value={form.genre} onChange={set("genre")}>
                          <option value="">Select genre</option>
                          {GENRES.map((g) => <option key={g} value={g}>{g}</option>)}
                        </select>
                      </div>
                      <div className="field" />
                    </div>
                    <div className="row">
                      <div className="field">
                        <label>Season #</label>
                        <input type="number" min="1" value={form.season} onChange={set("season")} />
                      </div>
                      <div className="field">
                        <label>Episode #</label>
                        <input type="number" min="1" value={form.episode} onChange={set("episode")} />
                      </div>
                    </div>
                    <div className="field">
                      <label>Episode Title</label>
                      <input value={form.epTitle} onChange={set("epTitle")} placeholder="e.g. To You, in 2000 Years" />
                    </div>

                    <div className="field">
                      <label>Cover Poster (optional) → Posters bucket</label>
                      <div
                        className={`file-drop ${postDrag ? "drag" : ""}`}
                        onDragOver={(e) => { e.preventDefault(); setPostDrag(true); }}
                        onDragLeave={() => setPostDrag(false)}
                        onDrop={(e) => { e.preventDefault(); setPostDrag(false); setPosterFile(e.dataTransfer.files[0]); }}
                      >
                        <input type="file" accept="image/*" onChange={(e) => setPosterFile(e.target.files[0])} />
                        <div className="file-drop-icon"><Icon.Image /></div>
                        {posterFile
                          ? <p className="file-name">{posterFile.name}</p>
                          : <p>Drag & drop or click<br />Image files (jpg, png, webp)</p>
                        }
                      </div>
                    </div>

                    <div className="field">
                      <label>Episode File * → Series bucket</label>
                      <div
                        className={`file-drop ${epDrag ? "drag" : ""}`}
                        onDragOver={(e) => { e.preventDefault(); setEpDrag(true); }}
                        onDragLeave={() => setEpDrag(false)}
                        onDrop={(e) => { e.preventDefault(); setEpDrag(false); setEpisodeFile(e.dataTransfer.files[0]); }}
                      >
                        <input type="file" accept="video/*,audio/*,.mkv,.mp4,.avi" onChange={(e) => setEpisodeFile(e.target.files[0])} />
                        <div className="file-drop-icon"><Icon.Upload /></div>
                        {episodeFile
                          ? <><p className="file-name">{episodeFile.name}</p><p>{formatBytes(episodeFile.size)}</p></>
                          : <p>Drag & drop or click<br />Video files (mp4, mkv, avi…)</p>
                        }
                      </div>
                    </div>

                    {loading && (
                      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                        <div className="progress-bar">
                          <div className="progress-fill" style={{ width: `${progress}%` }} />
                        </div>
                        <div className="upload-steps">
                          {steps.map((s) => (
                            <div key={s} className={`step-row ${progress === 100 ? "done" : s === step ? "active" : steps.indexOf(s) < steps.indexOf(step) ? "done" : ""}`}>
                              <div className="step-dot" />
                              {s.replace("…", "")}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {error && <div className="error-msg">⚠ {error}</div>}

                    <div style={{ display: "flex", gap: "10px" }}>
                      <button className="btn btn-ghost" onClick={() => !loading && onClose()} style={{ flex: 1 }}>Cancel</button>
                      <button className="btn btn-primary" onClick={submit} disabled={loading} style={{ flex: 2 }}>
                        {loading ? `${progress}% — Uploading…` : "Publish Episode"}
                      </button>
                    </div>
                  </>
              }
            </div>
          </div>
        </div>
      );
    }

    // ─── Anime Detail ─────────────────────────────────────────────────────────
    function AnimeDetail({ id, onBack }) {
      const [anime, setAnime] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        db.getAnimeById(id)
          .then((data) => { setAnime(data?.[0] || null); setLoading(false); })
          .catch(() => setLoading(false));
      }, [id]);

      if (loading) return <div className="loading"><div className="spinner"><Icon.Spinner /></div></div>;
      if (!anime) return <div className="empty"><h3>Not found</h3><p>This anime doesn't exist.</p></div>;

      const seasons = (anime.seasons || []).sort((a, b) => a.number - b.number);

      return (
        <div className="main" style={{ paddingTop: 28 }}>
          <button className="back-btn" onClick={onBack}><Icon.Arrow /> Back to Browse</button>
          <div className="detail-hero">
            <div className="detail-thumb">
              {anime.cover_url
                ? <img src={anime.cover_url} alt={anime.title} />
                : <Icon.Film />
              }
            </div>
            <div className="detail-info">
              <div className="detail-title">{anime.title}</div>
              {anime.description && <p className="detail-desc">{anime.description}</p>}
              <div className="detail-tags">
                {anime.genre && <span className="genre-tag">{anime.genre}</span>}
                <span className="season-tag">{seasons.length} Season{seasons.length !== 1 ? "s" : ""}</span>
                <span className="season-tag">
                  {seasons.reduce((acc, s) => acc + (s.episodes?.length || 0), 0)} Episodes
                </span>
              </div>
            </div>
          </div>

          {seasons.length === 0
            ? <div className="empty" style={{ padding: "40px 0" }}>
                <h3>No episodes yet</h3>
                <p>Be the first to upload an episode using the + button.</p>
              </div>
            : <div className="seasons">
                {seasons.map((s) => {
                  const eps = (s.episodes || []).sort((a, b) => a.number - b.number);
                  return (
                    <div key={s.id} className="season-block">
                      <div className="season-header">Season {s.number} · {eps.length} Episode{eps.length !== 1 ? "s" : ""}</div>
                      <div className="episode-list">
                        {eps.length === 0
                          ? <div className="no-episodes">No episodes in this season.</div>
                          : eps.map((ep) => (
                              <div key={ep.id} className="episode-row">
                                <span className="ep-num">E{ep.number}</span>
                                <span className="ep-title">{ep.title}</span>
                                {ep.file_size && <span className="ep-size">{formatBytes(ep.file_size)}</span>}
                                {ep.file_url && (
                                  <a
                                    className="dl-btn"
                                    href={ep.file_url}
                                    download={ep.file_name || true}
                                    target="_blank"
                                    rel="noopener noreferrer"
                                  >
                                    <Icon.Download /> Download
                                  </a>
                                )}
                              </div>
                            ))
                        }
                      </div>
                    </div>
                  );
                })}
              </div>
          }
        </div>
      );
    }

    // ─── Main App ─────────────────────────────────────────────────────────────
    function App() {
      const [animeList, setAnimeList] = useState([]);
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState("");
      const [showUpload, setShowUpload] = useState(false);
      const [selectedId, setSelectedId] = useState(null);
      const [toast, setToast] = useState("");
      const debounceRef = useRef(null);

      const fetchAnime = useCallback((q = "") => {
        setLoading(true);
        db.getAnime(q)
          .then((data) => setAnimeList(data || []))
          .catch(() => setAnimeList([]))
          .finally(() => setLoading(false));
      }, []);

      useEffect(() => { fetchAnime(); }, []);

      const handleSearch = (e) => {
        const v = e.target.value;
        setSearch(v);
        clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(() => fetchAnime(v), 280);
      };

      if (selectedId) {
        return (
          <div className="app">
            <style>{styles}</style>
            <nav className="nav">
              <div className="nav-logo" onClick={() => setSelectedId(null)}>Anime<span>Vault</span></div>
            </nav>
            <AnimeDetail id={selectedId} onBack={() => setSelectedId(null)} />
            <button className="fab" onClick={() => setShowUpload(true)} title="Upload episode"><Icon.Plus /></button>
            {showUpload && (
              <UploadModal
                onClose={() => setShowUpload(false)}
                onSuccess={() => { setToast("✓ Episode published!"); fetchAnime(search); }}
              />
            )}
            {toast && <Toast msg={toast} onDone={() => setToast("")} />}
          </div>
        );
      }

      return (
        <div className="app">
          <style>{styles}</style>
          <nav className="nav">
            <div className="nav-logo">Anime<span>Vault</span></div>
            <div className="nav-search">
              <span className="search-icon"><Icon.Search /></span>
              <input value={search} onChange={handleSearch} placeholder="Search anime…" />
            </div>
          </nav>

          {!search && (
            <div className="hero">
              <h1>Your <em>anime</em> library,<br />open to everyone.</h1>
              <p>Browse, upload, and download anime episodes — no account required.</p>
            </div>
          )}

          <div className="main">
            <div className="section-header">
              <div className="section-title">
                {search ? `Results for "${search}"` : "All Anime"}
              </div>
              <div className="count-badge">{animeList.length} titles</div>
            </div>

            {loading
              ? <div className="loading"><div className="spinner"><Icon.Spinner /></div></div>
              : animeList.length === 0
                ? <div className="empty">
                    <h3>{search ? "No results found" : "Nothing here yet"}</h3>
                    <p>{search ? "Try a different title." : "Tap + to upload the first anime."}</p>
                  </div>
                : <div className="anime-grid">
                    {animeList.map((a) => (
                      <div key={a.id} className="anime-card" onClick={() => setSelectedId(a.id)}>
                        <div className="anime-card-thumb">
                          {a.cover_url
                            ? <img src={a.cover_url} alt={a.title} loading="lazy" />
                            : <Icon.Film />
                          }
                        </div>
                        <div className="anime-card-body">
                          <div className="anime-card-title">{a.title}</div>
                          <div className="anime-card-meta">
                            {a.genre && <span className="genre-tag">{a.genre}</span>}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
            }
          </div>

          <button className="fab" onClick={() => setShowUpload(true)} title="Upload episode"><Icon.Plus /></button>
          {showUpload && (
            <UploadModal
              onClose={() => setShowUpload(false)}
              onSuccess={() => { setToast("✓ Episode published!"); fetchAnime(search); }}
            />
          )}
          {toast && <Toast msg={toast} onDone={() => setToast("")} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
